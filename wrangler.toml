name = "edgeeverrr"
main = "apps/api/src/index.ts"
compatibility_date = "2026-06-26"
workers_dev = true

[assets]
directory = "apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/mcp"]

[[d1_databases]]
binding = "DB"
database_name = "edgeever"
database_id = "ee82956a-a727-4d3e-bb69-5726a51c8aa4"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "RESOURCES"
bucket_name = "edgeever-resources"
preview_bucket_name = "edgeever-resources"

[observability]
enabled = true
