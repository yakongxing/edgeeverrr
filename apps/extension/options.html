<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="optionsTitle">EdgeEver Web Clipper settings</title>
  </head>
  <body>
    <main class="options-shell">
      <h1 data-i18n="extensionName">EdgeEver Web Clipper</h1>
      <form id="settings-form">
        <label>
          <span data-i18n="instanceAddress">EdgeEver instance URL</span>
          <input id="instance-url" type="url" placeholder="https://notes.example.com" required />
        </label>
        <label>
          API Token
          <input id="token" type="password" placeholder="Create one in EdgeEver settings" data-i18n-placeholder="tokenPlaceholder" required />
        </label>
        <label>
          <span data-i18n="defaultNotebook">Default notebook</span>
          <select id="notebook-id">
            <option value="" data-i18n="autoFirstNotebook">Use the first notebook automatically after connecting</option>
          </select>
        </label>
        <div class="actions">
          <button id="test" type="button" class="secondary" data-i18n="testConnection">Test connection</button>
          <button id="save" type="submit" data-i18n="saveSettings">Save settings</button>
        </div>
        <p id="status" class="status" role="status"></p>
      </form>
      <p class="privacy-link">
        <a href="https://edgeever.org/privacy" target="_blank" rel="noopener noreferrer" data-i18n="privacyPolicy">Privacy policy</a>
      </p>
    </main>
    <script type="module" src="/src/options.ts"></script>
  </body>
</html>
